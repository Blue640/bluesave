<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSave | Storage</title>
    <style>
        :root {
            --bg: #121417;
            --card: #1c1f24;
            --accent: #4a9eff;
            --border: #2d333b;
            --text: #b0b7c1;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --top-color: #ffcc00;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-mono); margin: 0; line-height: 1.5; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #0f1114; position: sticky; top: 0; z-index: 100; }
        .logo-block { display: flex; flex-direction: column; }
        .logo { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .logo-link { text-decoration: none; color: var(--text); opacity: 0.7; font-size: 0.65rem; }
        .btn-upload { border: 1px dashed var(--accent); color: var(--accent); padding: 6px 12px; text-decoration: none; font-size: 0.75rem; background: transparent; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .search-box { width: 100%; padding: 14px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); margin-bottom: 20px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        .top-badge { position: absolute; top: 10px; right: 10px; background: var(--top-color); color: #000; font-size: 0.6rem; font-weight: 900; padding: 2px 6px; }
        .card-img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border: 1px solid var(--border); margin-bottom: 12px; }
        .profile-info { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .avatar-box { width: 20px; height: 20px; border-radius: 3px; }
        .badge { font-size: 0.6rem; padding: 1px 4px; border-radius: 2px; text-transform: uppercase; font-weight: bold; }
        .card-title { color: #fff; font-size: 0.9rem; margin: 5px 0 10px 0; min-height: 2.7em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .stats { font-size: 0.65rem; color: #5c6370; margin-bottom: 10px; }
        .btn-download { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 12px; font-size: 0.8rem; font-weight: bold; font-family: var(--font-mono); cursor: pointer; width: 100%; }
        .btn-download:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo-block">
        <div class="logo">BLUE<span style="color:var(--accent)">SAVE</span></div>
        <a href="https://t.me/bluesave_mts" target="_blank" class="logo-link">BY @BlueSave_MTS</a>
    </div>
    <a href="https://forms.gle/tcu6xcjLdpWq5miBA" target="_blank" class="btn-upload">[+] Загрузить</a>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="ПОИСК...">
    <div class="grid" id="gallery"></div>
</div>

<script>
const SCRIPT_URL = 'ССЫЛКА_ИЗ_APPS_SCRIPT';
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyVktG3-mSFwav63VY8FxuOXGthCx7eQtGrCrAtTflRn4mz57fECmfOtp6F09ry3mxWUbXhHAO6XFc/pub?output=csv';
const profiles = {
"Xaritob23": { role: "Проверенный", color: "#4a9eff" },
"Blue": { role: "Создатель", color: "#00ffcc" },
"BlueSave": { role: "Разработчик", color: "#ff4a4a" }
};
async function downloadFile(url, filename, rowId) {
const beacon = new Image();
beacon.src = SCRIPT_URL + "?row=" + rowId + "&t=" + Date.now();
try {
const res = await fetch(url);
const blob = await res.blob();
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = filename;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
} catch (e) {
window.open(url, '_blank');
}
}
async function fetchData() {
const gallery = document.getElementById('gallery');
try {
const res = await fetch(CSV_URL);
const text = await res.text();
const rows = text.trim().split(/\r?\n/).slice(1);
let data = rows.map((r, i) => {
const c = r.match(/(".*?"|[^",;]+)(?=\s*[,;]|\s*$)/g);
return {
id: i + 2,
title: c[0].replace(/"/g, ''),
author: c[1].replace(/"/g, ''),
img: c[2].replace(/"/g, ''),
link: c[3].replace(/"/g, ''),
downloads: parseInt(c[4]) || 0
};
});
data.sort((a, b) => b.downloads - a.downloads);
const devIdx = data.findIndex(x => x.author === 'BlueSave');
let dev = devIdx !== -1 ? data.splice(devIdx, 1)[0] : null;
let lucky = null;
if (data.length > 0) {
lucky = data[data.length - 1];
}
let final = [];
if (dev) final.push(dev);
if (lucky) final.push(lucky);
data.forEach((item, index) => {
if (lucky && item.id === lucky.id) return;
final.push(item);
if (lucky && (index + 1) % 3 === 0) {
final.push(lucky);
}
});
const maxD = Math.max(...final.map(d => d.downloads));
gallery.innerHTML = '';
final.forEach(item => {
const p = profiles[item.author] || { role: "Юзер", color: "#707a8c" };
const isTop = item.downloads === maxD && maxD > 0;
gallery.innerHTML += `
<div class="card">
${isTop ? '<div class="top-badge">ТОП СКАЧИВАНИЙ</div>' : ''}
<img src="${item.img}" class="card-img" loading="lazy">
<div class="profile-info">
<div class="avatar-box" style="background:${p.color}"></div>
<div style="font-size:0.75rem;color:${p.color}">@${item.author}</div>
<div class="badge" style="border:1px solid ${p.color};color:${p.color}">${p.role}</div>
</div>
<h3 class="card-title">${item.title}</h3>
<div class="stats"><span>📥 СКАЧАНО: ${item.downloads}</span></div>
<button class="btn-download" onclick="downloadFile('${item.link}', '${item.title}', ${item.id})">СКАЧАТЬ</button>
</div>`;
});
} catch (e) { gallery.innerHTML = 'DATABASE_ERROR'; }
}
document.getElementById('searchInput').addEventListener('input', function() {
const q = this.value.toLowerCase();
document.querySelectorAll('.card').forEach(c => {
c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
});
});
fetchData();

</script>
</body>
</html>
