<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSave | Storage</title>
    <style>
        :root {
            --bg: #121417;
            --card: #1c1f24;
            --accent: #4a9eff;
            --border: #2d333b;
            --text: #b0b7c1;
            --font-mono: 'Consolas', 'Monaco', monospace;
        }
        body { background: var(--bg); color: var(--text); font-family: var(--font-mono); margin: 0; }
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #000; border: 1px solid var(--border); margin-bottom: 10px; }
        .card-title { color: #fff; font-size: 0.9rem; margin: 0 0 10px 0; }
        .btn { border: 1px solid var(--accent); color: var(--accent); text-align: center; padding: 8px; text-decoration: none; font-size: 0.8rem; margin-top: auto; }
        .btn:hover { background: var(--accent); color: #000; }
        #loader { text-align: center; padding: 50px; color: var(--accent); width: 100%; grid-column: 1/-1; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; color:#fff;">BLUE<span>SAVE</span></div>
    <div style="font-size: 0.7rem; opacity: 0.5;">v1.0_STABLE</div>
</header>

<div class="container">
    <div class="grid" id="gallery">
        <div id="loader">RUNNING_FETCH_SEQUENCE...</div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyVktG3-mSFwav63VY8FxuOXGthCx7eQtGrCrAtTflRn4mz57fECmfOtp6F09ry3mxWUbXhHAO6XFc/pub?output=csv';

    async function load() {
        const gallery = document.getElementById('gallery');
        try {
            const r = await fetch(SHEET_URL);
            if (!r.ok) throw new Error('Network error');
            
            const rawData = await r.text();
            // Очистка от странных символов и разбивка на строки
            const rows = rawData.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
            
            if (rows.length === 0) {
                gallery.innerHTML = '<div id="loader">DATABASE_IS_EMPTY</div>';
                return;
            }

            gallery.innerHTML = '';

            rows.forEach(row => {
                // Разделение с учетом возможных кавычек в CSV
                const cols = row.match(/(".*?"|[^",;]+)(?=\s*[,;]|\s*$)/g);
                
                if (cols && cols.length >= 4) {
                    const title = cols[0].replace(/"/g, '').trim();
                    const author = cols[1].replace(/"/g, '').trim();
                    const img = cols[2].replace(/"/g, '').trim();
                    const link = cols[3].replace(/"/g, '').trim();

                    gallery.innerHTML += `
                        <div class="card">
                            <img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/300x180/000/333?text=IMG_ERR'">
                            <h3 class="card-title">${title}</h3>
                            <div style="font-size:0.7rem; margin-bottom:15px; color:var(--accent)">@${author}</div>
                            <a href="${link}" class="btn" target="_blank">DOWNLOAD</a>
                        </div>
                    `;
                }
            });
        } catch (e) {
            gallery.innerHTML = '<div id="loader" style="color:red">FETCH_FAILED: CHECK_CORS_OR_URL</div>';
            console.error(e);
        }
    }
    load();
</script>

</body>
</html>
