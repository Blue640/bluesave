<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSave | Storage</title>
    <style>
        /* --- НАСТРОЙКИ СТИЛЯ --- */
        :root {
            --bg: #121417;
            --card: #1c1f24;
            --accent: #4a9eff;
            --border: #2d333b;
            --text: #b0b7c1;
            --font-mono: 'Consolas', 'Monaco', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            margin: 0;
            line-height: 1.5;
        }

        /* Шапка с предложкой */
        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1114;
        }

        .logo-block {
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
        }

        /* Кнопка предложки */
        .btn-upload {
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 8px 15px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.2s;
            cursor: pointer;
            background: transparent;
        }

        .btn-upload:hover {
            background: var(--accent);
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Поле поиска */
        .search-box {
            width: 100%;
            padding: 12px 15px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 1rem;
            outline: none;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Карточки */
        .card {
            background: var(--card);
            padding: 15px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .card:hover { border-color: var(--accent); }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #000;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .avatar-box {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }

        .badge {
            font-size: 0.65rem;
            padding: 2px 5px;
            border-radius: 3px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .card-title {
            color: #fff;
            font-size: 0.95rem;
            margin: 10px 0;
        }

        /* Кнопка скачивания */
        .btn-download {
            margin-top: auto;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-download:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #status {
            grid-column: 1/-1;
            text-align: center;
            padding: 100px;
            color: var(--accent);
        }
    </style>
</head>
<body>

<header>
    <div class="logo-block">
        <div class="logo">BLUE<span style="color:var(--accent)">SAVE</span></div>
    </div>
    
    <a href="https://forms.gle/tcu6xcjLdpWq5miBA" target="_blank" class="btn-upload">[+] Загрузить</a>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="[ ПОИСК ПЕРЕКРАСОК И АВТОРОВ... ]">

    <div class="grid" id="gallery">
        <div id="status">ЗАГРУЗКА...</div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyVktG3-mSFwav63VY8FxuOXGthCx7eQtGrCrAtTflRn4mz57fECmfOtp6F09ry3mxWUbXhHAO6XFc/pub?output=csv';

    const profileSystem = {
        "Polyakov": { role: "Проверенный", color: "#4a9eff" },
        "Blue": { role: "Создатель", color: "#00ffcc" },
        "Yaroslav_88": { role: "Разработчик", color: "#ff4a4a" }
    };

    // Функция скачивания файлов
    async function downloadFile(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(blobUrl);
        } catch (e) {
            window.open(url, '_blank');
        }
    }

    async function fetchData() {
        const gallery = document.getElementById('gallery');
        try {
            const response = await fetch(SHEET_URL);
            const rawText = await response.text();
            const rows = rawText.trim().split(/\r?\n/).slice(1);
            
            if (rows.length === 0) {
                gallery.innerHTML = '<div id="status">STORAGE_EMPTY</div>';
                return;
            }

            gallery.innerHTML = '';

            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",;]+)(?=\s*[,;]|\s*$)/g);
                
                if (cols && cols.length >= 4) {
                    const title = cols[0].replace(/"/g, '').trim();
                    const author = cols[1].replace(/"/g, '').trim();
                    const img = cols[2].replace(/"/g, '').trim();
                    const link = cols[3].replace(/"/g, '').trim();

                    const userProfile = profileSystem[author] || { role: "USER", color: "#707a8c" };

                    gallery.innerHTML += `
                        <div class="card">
                            <img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/300x180/000/333?text=NO_IMAGE'">
                            
                            <div class="profile-info">
                                <div class="avatar-box" style="background: ${userProfile.color}"></div>
                                <div style="font-size: 0.8rem; color: ${userProfile.color}">@${author}</div>
                                <div class="badge" style="border: 1px solid ${userProfile.color}; color: ${userProfile.color}">
                                    ${userProfile.role}
                                </div>
                            </div>

                            <h3 class="card-title">${title}</h3>
                            
                            <button class="btn-download" onclick="downloadFile('${link}', '${title}')">СКАЧАТЬ</button>
                        </div>
                    `;
                }
            });
        } catch (error) {
            gallery.innerHTML = '<div id="status" style="color:red">ERROR_CONNECTION_REFUSED</div>';
        }
    }

    // Скрипт живого поиска
    document.getElementById('searchInput').addEventListener('input', function() {
        const query = this.value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        
        cards.forEach(card => {
            const title = card.querySelector('.card-title').innerText.toLowerCase();
            const author = card.querySelector('.profile-info').innerText.toLowerCase();
            
            if (title.includes(query) || author.includes(query)) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    });

    fetchData();
</script>

</body>
</html>
