<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSave | Cloud Архив</title>
    <style>
        /* --- КОМФОРТНЫЙ ТЕМНЫЙ ДИЗАЙН --- */
        :root {
            --bg-body: #17191d;
            --bg-card: #1f2329;
            --accent: #5cafff;
            --text-main: #b0b7c1;
            --text-title: #ffffff;
            --border: #2d333b;
            --font-mono: 'Consolas', 'Monaco', monospace;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #121417;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            margin: 0;
            color: var(--text-title);
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Сетка карточек */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .card-img {
            width: 100%;
            height: 170px;
            background-color: #121417;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .card-body {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            margin: 0 0 10px 0;
            font-size: 1.05rem;
            color: var(--text-title);
            line-height: 1.3;
        }

        /* Инфо об авторе */
        .author-box {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .avatar-mini {
            width: 22px;
            height: 22px;
            border-radius: 4px;
        }

        .author-name {
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .btn-download {
            margin-top: auto;
            display: block;
            text-align: center;
            padding: 10px;
            background: #2d333b;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-download:hover {
            background: var(--accent);
            color: #121417;
        }

        #status {
            text-align: center;
            padding: 50px;
            font-family: var(--font-mono);
            opacity: 0.5;
        }
    </style>
</head>
<body>

<header>
    <h1>BlueSave</h1>
    <div style="font-size: 0.7rem; color: var(--accent); font-family: var(--font-mono);">DATABASE_ONLINE</div>
</header>

<div class="container">
    <div class="grid" id="gallery">
        <div id="status">Загрузка данных из таблицы...</div>
    </div>
</div>

<script>
    // 1. ВСТАВЬ СВОЮ ССЫЛКУ СЮДА
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyVktG3-mSFwav63VY8FxuOXGthCx7eQtGrCrAtTflRn4mz57fECmfOtp6F09ry3mxWUbXhHAO6XFc/pub?output=csv';
	// 2. НАСТРОЙКА РОЛЕЙ (один раз)
    const roles = {
        "Polyakov": { label: "Админ", color: "#4a9eff" },
        "Blue": { label: "Создатель", color: "#00ffcc" },
        "Yaroslav_88": { label: "Разработчик", color: "#ff4a4a" }
    };

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            
            // Чистим данные от пустых строк
            const rows = text.trim().split(/\r?\n/).slice(1);
            const container = document.getElementById('gallery');
            
            if (rows.length === 0) {
                container.innerHTML = '<div id="status">Таблица пуста.</div>';
                return;
            }

            container.innerHTML = ''; // Очистка

            rows.forEach(row => {
                // Разделяем по ; или , (для разных версий Excel/Google)
                const cols = row.split(/[;,]/);
                if (cols.length < 4) return;

                // Убираем кавычки и лишние пробелы
                const [title, author, img, link] = cols.map(c => c.trim().replace(/^"|"$/g, ''));
                
                // Получаем данные профиля
                const user = roles[author] || { label: "User", color: "#707a8c" };

                container.innerHTML += 
                    <div class="card">
                        <img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x250/121417/2d333b?text=IMAGE_ERROR'">
                        <div class="card-body">
                            <div class="author-box">
                                <div class="avatar-mini" style="background:${user.color}"></div>
                                <div class="author-name" style="color:${user.color}">
                                    ${author} <span style="font-size:0.6rem; opacity:0.6; color:#fff;">[${user.label}]</span>
                                </div>
                            </div>
                            <h3 class="card-title">${title}</h3>
                            <a href="${link}" class="btn-download" target="_blank">СКАЧАТЬ ФАЙЛ</a>
                        </div>
                    </div>
                ;
            });

        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = 'ОШИБКА ДОСТУПА. ПРОВЕРЬТЕ КОНСОЛЬ (F12).';
        }
    }

    loadData();
</script>

</body>
</html>
