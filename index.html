<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BlueSave | Cloud</title>
    <style>
        :root { --bg: #1e2227; --card: #282c34; --accent: #4a9eff; --text: #abb2bf; --border: #3e4451; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 170px; object-fit: cover; background: #17191d; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { color: #fff; margin: 0 0 5px 0; font-size: 1.1rem; }
        .card-author { color: var(--accent); font-family: monospace; font-size: 0.85rem; margin-bottom: 15px; }
        
        .btn { text-align: center; padding: 10px; background: #3e4451; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.9rem; margin-top: auto; }
        .btn:hover { background: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header><h1>BlueSave</h1></header>
    <div class="grid" id="gallery">Загрузка данных...</div>
</div>

<script>
    // СЮДА ВСТАВЬ ССЫЛКУ НА ОПУБЛИКОВАННЫЙ CSV ИЗ GOOGLE ТАБЛИЦ
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyVktG3-mSFwav63VY8FxuOXGthCx7eQtGrCrAtTflRn4mz57fECmfOtp6F09ry3mxWUbXhHAO6XFc/pub?output=csv';

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // Пропускаем заголовки
            
            const container = document.getElementById('gallery');
            container.innerHTML = ''; // Очищаем текст загрузки

            rows.forEach(row => {
                const cols = row.split(','); // Разделяем колонки по запятой
                if (cols.length < 4) return;

                const [title, author, img, link] = cols;

                container.innerHTML += 
                    <div class="card">
                        <img src="${img.trim()}" alt="Превью">
                        <div class="card-body">
                            <h3 class="card-title">${title.trim()}</h3>
                            <div class="card-author">@${author.trim()}</div>
                            <a href="${link.trim()}" class="btn" target="_blank">СКАЧАТЬ</a>
                        </div>
                    </div>
                ;
            });
        } catch (e) {
            document.getElementById('gallery').innerText = 'Ошибка загрузки данных.';
        }
    }

    loadData();
</script>
</body>
</html>
