<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSave | Storage</title>
    <style>
        :root {
            --bg: #121417;
            --card: #1c1f24;
            --accent: #4a9eff;
            --border: #2d333b;
            --text: #b0b7c1;
            --font-mono: 'Consolas', 'Monaco', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            margin: 0;
            line-height: 1.5;
        }

        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 15px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .card:hover { border-color: var(--accent); }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #000;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .avatar-box {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }

        .badge {
            font-size: 0.65rem;
            padding: 2px 5px;
            border-radius: 3px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .card-title {
            color: #fff;
            font-size: 0.95rem;
            margin: 10px 0;
        }

        .btn {
            margin-top: auto;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-align: center;
            padding: 10px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .btn:hover {
            background: var(--accent);
            color: #000;
        }

        #status {
            grid-column: 1/-1;
            text-align: center;
            padding: 100px;
            color: var(--accent);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">BLUE<span style="color:var(--accent)">SAVE</span></div>
    <div style="font-size: 0.7rem; opacity: 0.5;">DATABASE_v1.0</div>
</header>

<div class="container">
    <div class="grid" id="gallery">
        <div id="status">INITIALIZING_STORAGE...</div>
    </div>
</div>

<script>
    // Твоя проверенная ссылка на CSV
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyVktG3-mSFwav63VY8FxuOXGthCx7eQtGrCrAtTflRn4mz57fECmfOtp6F09ry3mxWUbXhHAO6XFc/pub?output=csv';

    // СИСТЕМА ПРОФИЛЕЙ
    const profileSystem = {
        "Polyakov": { role: "ADMIN", color: "#4a9eff" },
        "Egor_Dev": { role: "OWNER", color: "#00ffcc" },
        "Yaroslav_88": { role: "DEVELOPER", color: "#ff4a4a" }
    };

    async function fetchData() {
        const gallery = document.getElementById('gallery');
        try {
            const response = await fetch(SHEET_URL);
            const rawText = await response.text();
            
            // Парсинг строк (учитываем точку с запятой и кавычки)
            const rows = rawText.trim().split(/\r?\n/).slice(1);
            
            if (rows.length === 0) {
                gallery.innerHTML = '<div id="status">STORAGE_EMPTY</div>';
                return;
            }

            gallery.innerHTML = '';

            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",;]+)(?=\s*[,;]|\s*$)/g);
                
                if (cols && cols.length >= 4) {
                    const title = cols[0].replace(/"/g, '').trim();
                    const author = cols[1].replace(/"/g, '').trim();
                    const img = cols[2].replace(/"/g, '').trim();
                    const link = cols[3].replace(/"/g, '').trim();

                    // Определяем профиль автора
                    const userProfile = profileSystem[author] || { role: "USER", color: "#707a8c" };

                    gallery.innerHTML += `
                        <div class="card">
                            <img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/300x180/000/333?text=NO_IMAGE'">
                            
                            <div class="profile-info">
                                <div class="avatar-box" style="background: ${userProfile.color}"></div>
                                <div style="font-size: 0.8rem; color: ${userProfile.color}">@${author}</div>
                                <div class="badge" style="border: 1px solid ${userProfile.color}; color: ${userProfile.color}">
                                    ${userProfile.role}
                                </div>
                            </div>

                            <h3 class="card-title">${title}</h3>
                            
                            <a href="${link}" class="btn" download="${title}" target="_blank">DOWNLOAD_FILE</a>
                        </div>
                    `;
                }
            });

        } catch (error) {
            gallery.innerHTML = '<div id="status" style="color:red">ERROR_CONNECTION_REFUSED</div>';
            console.error(error);
        }
    }

    fetchData();
</script>

</body>
</html>
