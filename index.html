<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueSave</title>
<link rel="icon" href="bluesav.jpg" type="image/png">
<style>
:root {
--bg: #0f1114;
--card: #16191d;
--accent: #4a9eff;
--border: #2d333b;
--text: #b0b7c1;
--font-mono: 'Consolas', 'Monaco', monospace;
--top-color: #ffcc00;
}
* { box-sizing: border-box; }
body { background-color: var(--bg); color: var(--text); font-family: var(--font-mono); margin: 0; line-height: 1.5; }
header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #0a0c0f; position: sticky; top: 0; z-index: 100; }
.logo-block { display: flex; flex-direction: column; }
.logo { font-size: 1.7rem; font-weight: bold; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
.logo-link { text-decoration: none; color: var(--text); opacity: 0.6; font-size: 0.9rem; margin-top: 2px; }
.btn-upload { border: 1px dashed var(--accent); color: var(--accent); padding: 8px 16px; text-decoration: none; font-size: 1.1rem; background: transparent; }
.container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
.search-box { width: 100%; padding: 15px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); margin-bottom: 25px; outline: none; border-radius: 4px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.card { background: var(--card); padding: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; border-radius: 4px; }
.top-badge { position: absolute; top: 10px; right: 10px; background: var(--top-color); color: #000; font-size: 0.65rem; font-weight: 900; padding: 3px 8px; border-radius: 2px; }
.card-img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border: 1px solid var(--border); margin-bottom: 15px; }
.profile-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.avatar-box { width: 22px; height: 22px; border-radius: 4px; }
.badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; text-transform: uppercase; font-weight: bold; }
.card-title { color: #fff; font-size: 1rem; margin: 0 0 12px 0; min-height: 2.8em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.stats { font-size: 0.75rem; color: #5c6370; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }
.icon-dl { width: 14px; height: 14px; fill: currentColor; }
.btn-download { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 12px; font-size: 0.85rem; font-weight: bold; font-family: var(--font-mono); cursor: pointer; width: 100%; border-radius: 4px; }
.btn-download:hover { border-color: var(--accent); color: var(--accent); }
    /* фильтры */
.controls-wrapper { margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px; }
.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; }
.filter-btn { 
    background: transparent; 
    border: 1px solid var(--border); 
    color: var(--text); 
    padding: 8px 15px; 
    font-family: var(--font-mono); 
    cursor: pointer; 
    border-radius: 4px; 
    font-size: 0.8rem; 
    transition: 0.2s; 
}
.filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<header>
<div class="logo-block">
<div class="logo">BLUE<span style="color:var(--accent)">SAVE</span></div>
<a href="https://t.me/bluesave_mts" target="_blank" class="logo-link">BY @BlueSave_MTS</a>
</div>
<a href="https://forms.gle/tcu6xcjLdpWq5miBA" target="_blank" class="btn-upload">Загрузить</a>
</header>
<div class="container">
<div class="controls-wrapper">
    <input type="text" id="searchInput" class="search-box" placeholder="Поиск по моделям и авторам">
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterCards('all', this)">ВСЕ</button>
        <button class="filter-btn" onclick="filterCards('основа', this)">ОСНОВЫ</button>
        <button class="filter-btn" onclick="filterCards('repaint', this)">ПЕРЕКРАСКИ</button>
    </div>
</div>
<div class="grid" id="gallery"></div>
</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxsDfqYPMOoqgiO6YyIR4R5NguXwvAfiJP9v4Gc1OeccUtdOK4WaQiGoC-M5hqIeCg/exec';
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyVktG3-mSFwav63VY8FxuOXGthCx7eQtGrCrAtTflRn4mz57fECmfOtp6F09ry3mxWUbXhHAO6XFc/pub?output=csv';

const profiles = {
"Xaritob23": { role: "Проверенный юзер", color: "#4a9eff" },
"Blue": { role: "Создатель", color: "#00ffcc" },
"BlueSave": { role: "Разработчик", color: "#ff4a4a" }
};
    
let currentFilter = 'all';

function filterCards(type, btn) {
    currentFilter = type;
    // Подсвечиваем нажатую кнопку
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
        const title = c.querySelector('.card-title').innerText.toLowerCase();
        const textMatch = title.includes(q) || c.innerText.toLowerCase().includes(q);
        
        let filterMatch = true;
        if (currentFilter === 'основа') {
            filterMatch = title.includes('основа'); // Показываем только если в названии есть "Основа"
        } else if (currentFilter === 'repaint') {
            filterMatch = !title.includes('основа'); // Показываем всё, где НЕТ слова "Основа"
        }
        
        c.style.display = (textMatch && filterMatch) ? 'flex' : 'none';
    });
}
// Функция скачивания (исправлена)
async function downloadFile(url, filename, rowId) {
    const isLogged = localStorage.getItem('voted_' + rowId);
    if (!isLogged) {
        const beacon = new Image();
        beacon.src = SCRIPT_URL + "?row=" + rowId + "&t=" + Date.now();
        localStorage.setItem('voted_' + rowId, 'true');
    }

    try {
        const response = await fetch(url);
        const blob = await response.blob();
        
        // Создаем Blob с явным типом, чтобы не было .png в конце
        const imageBlob = new Blob([blob], { type: 'image/jpeg' });
        const blobUrl = window.URL.createObjectURL(imageBlob);
        
        const a = document.createElement('a');
        a.href = blobUrl;
        
        // Очищаем имя от точек и ставим чистый .jpg
        let cleanName = filename.split('.')[0]; 
        a.download = cleanName + ".jpg"; 
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(blobUrl);
    } catch (e) {
        window.open(url, '_blank');
    }
}

async function fetchData() {
const gallery = document.getElementById('gallery');
try {
const res = await fetch(CSV_URL);
const text = await res.text();
const rows = text.trim().split(/\r?\n/).slice(1);
let data = rows.map((r, i) => {
const c = r.match(/(".*?"|[^",;]+)(?=\s*[,;]|\s*$)/g);
return {
id: i + 2,
title: c[0].replace(/"/g, ''),
author: c[1].replace(/"/g, ''),
img: c[2].replace(/"/g, ''),
link: c[3].replace(/"/g, ''),
downloads: parseInt(c[4]) || 0
};
});

data.sort((a, b) => b.downloads - a.downloads);

const devIdx = data.findIndex(x => x.author === 'BlueSave');
let devItem = devIdx !== -1 ? data.splice(devIdx, 1)[0] : null;

let luckyItem = data.length > 0 ? data.pop() : null;

let final = [];
if (devItem) final.push(devItem);
if (luckyItem) final.push(luckyItem);
final = final.concat(data);

const maxD = Math.max(...final.map(d => d.downloads));
gallery.innerHTML = '';

final.forEach(item => {
const p = profiles[item.author] || { role: "Юзер", color: "#707a8c" };
const isTop = item.downloads === maxD && maxD > 0;
const hasBtn = item.author !== 'BlueSave';

gallery.innerHTML += `
<div class="card">
${isTop ? '<div class="top-badge">ТОП</div>' : ''}
<img src="${item.img}" class="card-img">
<div class="profile-info">
<div class="avatar-box" style="background:${p.color}"></div>
<div style="font-size:0.8rem;color:${p.color}">@${item.author}</div>
<div class="badge" style="border:1px solid ${p.color};color:${p.color}">${p.role}</div>
</div>
<h3 class="card-title">${item.title}</h3>
<div class="stats">
<svg class="icon-dl" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
<span>СКАЧАНО: ${item.downloads}</span>
</div>
${hasBtn ? `<button class="btn-download" onclick="downloadFile('${item.link}', '${item.title}', ${item.id})">СКАЧАТЬ</button>` : ''}
</div>`;
});
} catch (e) { gallery.innerHTML = 'ERROR'; }
}

// Этот код теперь запускает общую фильтрацию (и по тексту, и по кнопкам)
document.getElementById('searchInput').addEventListener('input', applyFilters);

fetchData();
</script>
</body>
</html>
