<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSave | Storage</title>
    <style>
        /* --- НАСТРОЙКИ СТИЛЯ --- */
        :root {
            --bg: #121417;
            --card: #1c1f24;
            --accent: #4a9eff;
            --border: #2d333b;
            --text: #b0b7c1;
            --font-mono: 'Consolas', 'Monaco', monospace;
        }

        * {
            box-sizing: border-box; /* Чтобы паддинги не раздували блоки */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            margin: 0;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent; /* Убираем синий блик при нажатии на мобилках */
        }

        /* Шапка */
        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1114;
            position: sticky; /* Чтобы шапка всегда была сверху */
            top: 0;
            z-index: 100;
        }

        .logo-block {
            display: flex;
            flex-direction: column;
            min-width: 0; /* Чтобы текст не ломал флекс */
        }

        .logo {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .logo-link {
            text-decoration: none; 
            color: var(--text); 
            opacity: 0.7; 
            font-size: 0.65rem; 
            margin-top: 2px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Кнопка предложки */
        .btn-upload {
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            text-decoration: none;
            font-size: 0.75rem;
            transition: 0.2s;
            cursor: pointer;
            background: transparent;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .btn-upload:hover {
            background: var(--accent);
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Поле поиска */
        .search-box {
            width: 100%;
            padding: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 1rem;
            outline: none;
            margin-bottom: 20px;
            transition: 0.2s;
            border-radius: 0; /* Оставляем острые углы для стиля */
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(74, 158, 255, 0.1);
        }

        /* Сетка карточек */
        .grid {
            display: grid;
            /* Адаптивная сетка: минимум 280px, если не влезает — в 1 колонку */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        /* Карточки */
        .card {
            background: var(--card);
            padding: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .card:hover { border-color: var(--accent); }

        .card-img {
            width: 100%;
            aspect-ratio: 16 / 9; /* Сохраняем пропорции картинки */
            object-fit: cover;
            background: #000;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .avatar-box {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .badge {
            font-size: 0.6rem;
            padding: 1px 4px;
            border-radius: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .card-title {
            color: #fff;
            font-size: 0.9rem;
            margin: 5px 0 15px 0;
            min-height: 2.7em; /* Чтобы заголовки в 2 строки не двигали кнопки */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Кнопка скачивания */
        .btn-download {
            margin-top: auto;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            text-align: center;
            padding: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .btn-download:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #status {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* Адаптация под мобильные устройства */
        @media (max-width: 480px) {
            header { padding: 15px; }
            .logo { font-size: 1rem; }
            .btn-upload { padding: 6px 10px; font-size: 0.7rem; }
            .container { margin: 15px auto; }
            .grid { gap: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-block">
        <div class="logo">BLUE<span style="color:var(--accent)">SAVE</span></div>
        <a href="https://t.me/bluesave_mts" target="_blank" class="logo-link">
            BY @BlueSave_MTS
        </a>
    </div>
    
    <a href="https://forms.gle/tcu6xcjLdpWq5miBA" target="_blank" class="btn-upload">[+] Загрузить</a>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="ПОИСК ПЕРЕКРАСОК И АВТОРОВ">

    <div class="grid" id="gallery">
        <div id="status">INITIALIZING_STORAGE...</div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyVktG3-mSFwav63VY8FxuOXGthCx7eQtGrCrAtTflRn4mz57fECmfOtp6F09ry3mxWUbXhHAO6XFc/pub?output=csv';

    const profileSystem = {
        "Polyakov": { role: "Проверенный", color: "#4a9eff" },
        "Blue": { role: "Создатель", color: "#00ffcc" },
        "BlueSave": { role: "Разработчик", color: "#ff4a4a" }
    };

    async function downloadFile(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(blobUrl);
        } catch (e) {
            window.open(url, '_blank');
        }
    }

    async function fetchData() {
        const gallery = document.getElementById('gallery');
        try {
            const response = await fetch(SHEET_URL);
            const rawText = await response.text();
            const rows = rawText.trim().split(/\r?\n/).slice(1);
            
            if (rows.length === 0) {
                gallery.innerHTML = '<div id="status">STORAGE_EMPTY</div>';
                return;
            }

            gallery.innerHTML = '';

            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",;]+)(?=\s*[,;]|\s*$)/g);
                
                if (cols && cols.length >= 4) {
                    const title = cols[0].replace(/"/g, '').trim();
                    const author = cols[1].replace(/"/g, '').trim();
                    const img = cols[2].replace(/"/g, '').trim();
                    const link = cols[3].replace(/"/g, '').trim();

                    const userProfile = profileSystem[author] || { role: "USER", color: "#707a8c" };

                    gallery.innerHTML += `
                        <div class="card">
                            <img src="${img}" class="card-img" loading="lazy" onerror="this.src='https://via.placeholder.com/300x180/000/333?text=NO_IMAGE'">
                            
                            <div class="profile-info">
                                <div class="avatar-box" style="background: ${userProfile.color}"></div>
                                <div style="font-size: 0.75rem; color: ${userProfile.color}">@${author}</div>
                                <div class="badge" style="border: 1px solid ${userProfile.color}; color: ${userProfile.color}">
                                    ${userProfile.role}
                                </div>
                            </div>

                            <h3 class="card-title">${title}</h3>
                            
                            <button class="btn-download" onclick="downloadFile('${link}', '${title}')">СКАЧАТЬ</button>
                        </div>
                    `;
                }
            });
        } catch (error) {
            gallery.innerHTML = '<div id="status" style="color:#ff4a4a">ERROR_CONNECTION_REFUSED</div>';
        }
    }

    document.getElementById('searchInput').addEventListener('input', function() {
        const query = this.value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        
        cards.forEach(card => {
            const title = card.querySelector('.card-title').innerText.toLowerCase();
            const author = card.querySelector('.profile-info').innerText.toLowerCase();
            
            card.style.display = (title.includes(query) || author.includes(query)) ? 'flex' : 'none';
        });
    });

    fetchData();
</script>

</body>
</html>
